<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../CSS/Ong/animaiscadastrados.css">
  <title>Animais Cadastrados</title>
</head>

<body>
  <div class="topo">
    <div class="topo-menu">
      <button class="menu-logo" onclick="abreMenu()"><img src="../../Imagens/Icones/menu-de-hamburguer.png"
          alt="Menu Lateral"></button>
      <img class="logo" src="../../Imagens/Logo.png" alt="Logo do Site">
      <h2>ARCA</h2>
    </div>
    <div class="topo-perfil">
      <div class="perfil" id="perfil">Perfil</div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>
  <div class="area-principal">
    <nav class="menu-lateral" id="menu-lateral"></nav>
    <main class="conteudo" id="conteudo">

      <h2 class="titulo">&#x1F436; Animais Cadastrados</h2>
        <button class="btn" onclick="abrirModalNovoAnimal()">+ Novo Animal</button>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Espécie</th>
              <th>Raça</th>
              <th>Idade</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Bolinha</td>
              <td>Cão</td>
              <td>Vira-lata</td>
              <td>2 anos</td>
              <td><span class="tag tag-verde">Disponível</span>
              </td>
              <td>
                <div class="acoes">
                  <button class="btn-altera" onclick="atualizar()"><img
                      src="../../Imagens/Icones/lapis.png" alt="Botão de alterar"></button>
                  <button class="btn-exclui" onclick="excluir()"><img
                      src="../../Imagens/Icones/lixeira.png" alt="Botão de excluir"></button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
</body>

</html>
<script src="../../JS/Ong/animaiscadastrados.js"></script>
