<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../CSS/Tutor/meuPet.css">
    <title>Tutor</title>
</head>

<body>
    <div class="topo">
        <div class="topo-menu">
            <button class="menu-logo" onclick="abreMenu()"><img src="../../Imagens/Icones/menu-de-hamburguer.png"
                    alt="Menu Lateral"></button>
            <img class="logo" src="../../Imagens/Logo.png" alt="Logo do Site">
            <h2>ARCA</h2>
        </div>
        <div class="topo-perfil">
            <div class="perfil" id="perfil">Perfil</div>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </div>
    <div class="area-principal">
        <nav class="menu-lateral" id="menu-lateral"></nav>
        <div>
            <h2 class="titulo">🐶 Meu Pet</h2>
            <main class="conteudo" id="conteudo"></main>

        </div>
    </div>
</body>

</html>
<script src="../../JS/Tutor/meuPet.js"></script>

<div class="fundo-cadastro" id="fundo_cadastro">
    <div class="card-cadastro" id="card_cadastro">
        <div class="titulo-card">
            <h3>Cadastrar Novo Pet</h3>
            <button class="btn-fechar" onclick="fecharCadastroPet()"><img src="../../Imagens/Icones/cruz.png"
                    alt="Botão de fechar"></button>
        </div>
        <form>
            <label>Nome do pet:</label>
            <input type="text" name="nomePet" id="nomePet" placeholder="Escreva o nome do Pet">

            <div class="lado-lado">

                <label>Espécie:</label>
                <select type="text" name="especie" id="especie">
                    <option value="Cão">Cão</option>
                    <option value="Gato">Gato</option>
                </select>

                <label>Raça:</label>
                <input type="text" name="raca" id="raca" placeholder="Raça do Pet">
            </div>

            <div class="lado-lado">
                <label>Idade:</label>
                <input type="text" name="idade" id="idade" placeholder="Ex: 2 anos">

                <label>Sexo:</label>
                <select type="text" name="sexo" id="sexo">
                    <option value="Macho">Macho</option>
                    <option value="Fêmea">Fêmea</option>
                </select>
            </div>
            <div style="display: flex; align-items: center ;gap: 10px; margin-top: 20px;">

                <div style="display: flex; align-items: center ;gap: 10px;">
                    <label>Peso:</label>
                    <input type="text" name="peso" id="peso" placeholder="Ex: 8 kg" style="max-width: 300px;">
                </div>

                <div>
                    <label>Castrado:</label>
                    <div style="display: flex; justify-content: space-between;">
                        <input type="radio" id="Sim" name="opcao" value="Sim">Sim
                        <input type="radio" id="Nao" name="opcao" value="Não">Não
                    </div>
                </div>
            </div>

            <button type="reset" class="btn-salvar" onclick="salvarCadastroPet()">Salvar</button>
        </form>
    </div>
</div>




<div class="fundo-cadastro" id="fundo_altera">
    <div class="card-cadastro" id="card_altera">
        <div class="titulo-card">
            <h3>Alterar Pet</h3>
            <button class="btn-fechar" onclick="fecharAlteraPet()"><img src="../../Imagens/Icones/cruz.png"
                    alt="Botão de fechar"></button>
        </div>
        <form>
            <label>Nome do pet:</label>
            <input type="text" name="AlteraNomePet" id="AlteraNomePet" placeholder="Escreva o nome do Pet">

            <div class="lado-lado">

                <label>Espécie:</label>
                <select type="text" name="AlteraEspecie" id="AlteraEspecie">
                    <option value="Cão">Cão</option>
                    <option value="Gato">Gato</option>
                </select>

                <label>Raça:</label>
                <input type="text" name="AlteraRaca" id="AlteraRaca" placeholder="Raça do Pet">
            </div>

            <div class="lado-lado">
                <label>Idade:</label>
                <input type="text" name="AlteraIdade" id="AlteraIdade" placeholder="Ex: 2 anos">

                <label>Sexo:</label>
                <select type="text" name="AlteraSexo" id="AlteraSexo">
                    <option value="Macho">Macho</option>
                    <option value="Fêmea">Fêmea</option>
                </select>
            </div>
            <div style="display: flex; align-items: center ;gap: 10px; margin-top: 20px;">

                <div style="display: flex; align-items: center ;gap: 10px;">
                    <label>Peso:</label>
                    <input type="text" name="AlteraPeso" id="AlteraPeso" placeholder="Ex: 8 kg"
                        style="max-width: 300px;">
                </div>

                <div>
                    <label>Castrado:</label>
                    <div style="display: flex; justify-content: space-between;">
                        <input type="radio" id="AlteraSim" name="AlteraOpcao" value="Sim">Sim
                        <input type="radio" id="AlteraNao" name="AlteraOpcao" value="Não">Não
                    </div>
                </div>
            </div>

            <button type="reset" class="btn-salvar" onclick="alterarCadastroPet(petIdSelecionado)">Salvar</button>
        </form>
    </div>
</div>
