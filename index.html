<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="./CSS/Login.css">
</head>

<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo"><img src="./Imagens/Logo.png" alt="Logo do Site"></div>
      <h1>ARCA</h1>
      <p>Animais Resgatados, Cuidados e Acolhidos</p>
    </div>
    <div id="login-alerta" class="alerta-erro esconde">Usuário ou senha incorretos.</div>

    <div class="form-group">
      <label for="inp-usuario">Usuário</label>
      <input type="text" id="inp-usuario" placeholder="Digite seu usuário" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="inp-senha">Senha</label>
      <input type="password" id="inp-senha" placeholder="Digite sua senha" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="realizarLogin()">Entrar no Sistema</button>
  </div>
</body>

</html>
<script src="./JS/Login.js"></script>
